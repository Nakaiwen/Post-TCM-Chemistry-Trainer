<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>後中醫化學考題練習器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700;900&family=Noto+Sans+TC:wght@300;400;500;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --paper: #f5efe2;
  --paper-soft: #faf6ec;
  --paper-deep: #ebe2cf;
  --ink: #1f1a14;
  --ink-soft: #4a3f31;
  --ink-faint: #8a7d6a;
  --vermillion: #b73329;
  --vermillion-soft: #d9614f;
  --jade: #4a6b54;
  --gold: #a07a2c;
  --line: #c9bfa8;
  --line-soft: #ddd1b8;
  --shadow: rgba(60, 45, 20, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  font-family: 'Noto Sans TC', 'Crimson Pro', sans-serif;
  background: var(--paper);
  color: var(--ink);
  line-height: 1.7;
  font-size: 16px;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse at top left, rgba(160, 122, 44, 0.04) 0%, transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(74, 107, 84, 0.04) 0%, transparent 50%);
}

/* 紙張紋理 */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  z-index: 1;
  mix-blend-mode: multiply;
}

.app {
  position: relative;
  z-index: 2;
  max-width: 880px;
  margin: 0 auto;
  padding: 32px 24px 80px;
}

/* === 頂部 === */
.header {
  text-align: center;
  margin-bottom: 36px;
  position: relative;
}

.header::after {
  content: '';
  display: block;
  width: 80px;
  height: 1px;
  background: var(--ink-faint);
  margin: 18px auto 0;
}

.title-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}

.seal {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 48px;
  height: 48px;
  background: var(--vermillion);
  color: var(--paper);
  font-family: 'Noto Serif TC', serif;
  font-weight: 900;
  font-size: 22px;
  border-radius: 6px;
  box-shadow: 0 2px 0 rgba(120, 30, 20, 0.4);
  letter-spacing: -0.05em;
}

h1 {
  font-family: 'Noto Serif TC', serif;
  font-weight: 700;
  font-size: 28px;
  letter-spacing: 0.05em;
  color: var(--ink);
}

.subtitle {
  margin-top: 8px;
  font-family: 'Crimson Pro', 'Noto Serif TC', serif;
  font-style: italic;
  color: var(--ink-faint);
  font-size: 14px;
  letter-spacing: 0.1em;
}

/* === 統計列 === */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--line);
  border: 1px solid var(--line);
  margin-bottom: 24px;
  border-radius: 4px;
  overflow: hidden;
}

.stat {
  background: var(--paper-soft);
  padding: 14px 8px;
  text-align: center;
}

.stat-num {
  font-family: 'Noto Serif TC', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--ink);
  line-height: 1;
}

.stat-num.accent { color: var(--vermillion); }
.stat-num.jade { color: var(--jade); }
.stat-num.gold { color: var(--gold); }

.stat-label {
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 6px;
  letter-spacing: 0.1em;
}

/* === Tabs === */
.tabs {
  display: flex;
  gap: 0;
  margin-bottom: 28px;
  border-bottom: 2px solid var(--line);
  flex-wrap: wrap;
}

.tab {
  padding: 12px 18px;
  background: none;
  border: none;
  font-family: 'Noto Serif TC', serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--ink-faint);
  cursor: pointer;
  position: relative;
  transition: color 0.2s;
  letter-spacing: 0.05em;
}

.tab:hover { color: var(--ink-soft); }

.tab.active {
  color: var(--vermillion);
}

.tab.active::after {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--vermillion);
}

/* === 內容區 === */
.panel {
  background: var(--paper-soft);
  border: 1px solid var(--line-soft);
  border-radius: 6px;
  padding: 32px 28px;
  box-shadow: 0 2px 8px var(--shadow);
  min-height: 400px;
}

/* 模式選擇（首頁） */
.mode-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 14px;
  margin-bottom: 24px;
}

.mode-btn {
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 22px 16px;
  cursor: pointer;
  text-align: center;
  transition: all 0.2s;
  font-family: 'Noto Serif TC', serif;
}

.mode-btn:hover {
  border-color: var(--vermillion);
  background: var(--paper-soft);
  transform: translateY(-2px);
  box-shadow: 0 4px 12px var(--shadow);
}

.mode-icon {
  font-size: 28px;
  margin-bottom: 10px;
  color: var(--vermillion);
  font-family: 'Noto Serif TC', serif;
  font-weight: 700;
}

.mode-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 4px;
  letter-spacing: 0.05em;
}

.mode-desc {
  font-size: 12px;
  color: var(--ink-faint);
}

/* === 題目卡片 === */
.question-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 18px;
  padding-bottom: 14px;
  border-bottom: 1px dashed var(--line);
}

.qmeta-left {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}

.tag {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 2px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.05em;
}

.tag-cat {
  background: var(--ink);
  color: var(--paper);
}

.tag-topic {
  background: var(--paper-deep);
  color: var(--ink-soft);
  border: 1px solid var(--line);
}

.qmeta-right {
  font-size: 12px;
  color: var(--ink-faint);
  font-family: 'Crimson Pro', serif;
  font-style: italic;
}

.bookmark-btn {
  background: none;
  border: none;
  cursor: pointer;
  font-size: 18px;
  color: var(--ink-faint);
  padding: 4px 8px;
  transition: color 0.2s;
}

.bookmark-btn:hover, .bookmark-btn.active { color: var(--gold); }

.question-text {
  font-size: 18px;
  line-height: 1.85;
  color: var(--ink);
  margin-bottom: 24px;
  font-family: 'Noto Serif TC', serif;
  font-weight: 500;
}

.question-text .formula,
.explanation .formula {
  font-family: 'Crimson Pro', 'Noto Serif TC', serif;
  font-style: italic;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 22px;
}

.option {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 14px 18px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  font-size: 16px;
  text-align: left;
  font-family: inherit;
  color: var(--ink);
  width: 100%;
}

.option:hover:not(:disabled) {
  border-color: var(--ink-soft);
  background: var(--paper-soft);
}

.option-letter {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1.5px solid var(--ink-faint);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Noto Serif TC', serif;
  font-weight: 700;
  font-size: 14px;
  color: var(--ink-soft);
}

.option-text {
  flex: 1;
  line-height: 1.6;
  padding-top: 2px;
}

.option.correct {
  background: rgba(74, 107, 84, 0.1);
  border-color: var(--jade);
  color: var(--jade);
}
.option.correct .option-letter {
  background: var(--jade);
  border-color: var(--jade);
  color: var(--paper);
}

.option.wrong {
  background: rgba(183, 51, 41, 0.08);
  border-color: var(--vermillion);
  color: var(--vermillion);
}
.option.wrong .option-letter {
  background: var(--vermillion);
  border-color: var(--vermillion);
  color: var(--paper);
}

.option:disabled { cursor: default; }

/* === 解析 === */
.explanation {
  margin-top: 18px;
  padding: 18px 22px;
  background: var(--paper-deep);
  border-left: 3px solid var(--gold);
  border-radius: 0 4px 4px 0;
  animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(-4px); }
  to { opacity: 1; transform: translateY(0); }
}

.exp-title {
  font-family: 'Noto Serif TC', serif;
  font-weight: 700;
  color: var(--gold);
  font-size: 14px;
  margin-bottom: 8px;
  letter-spacing: 0.1em;
}

.exp-content {
  font-size: 15px;
  line-height: 1.8;
  color: var(--ink-soft);
}

/* === 動作列 === */
.actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 24px;
  gap: 12px;
  flex-wrap: wrap;
}

.btn {
  padding: 10px 22px;
  border: none;
  border-radius: 4px;
  font-family: 'Noto Serif TC', serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.05em;
}

.btn-primary {
  background: var(--vermillion);
  color: var(--paper);
}
.btn-primary:hover { background: #9c2820; transform: translateY(-1px); }

.btn-secondary {
  background: transparent;
  color: var(--ink-soft);
  border: 1px solid var(--line);
}
.btn-secondary:hover { background: var(--paper-deep); }

/* === 進度條 === */
.progress-bar {
  height: 4px;
  background: var(--line-soft);
  border-radius: 2px;
  overflow: hidden;
  margin-bottom: 18px;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--vermillion), var(--gold));
  transition: width 0.3s;
}

/* === 統計頁 === */
.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
}

.stat-card {
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 20px;
  border-radius: 4px;
}

.stat-card-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--line-soft);
  letter-spacing: 0.1em;
}

.topic-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  font-size: 14px;
  border-bottom: 1px dashed var(--line-soft);
}

.topic-row:last-child { border-bottom: none; }

.topic-name { color: var(--ink-soft); }

.topic-stats {
  display: flex;
  align-items: center;
  gap: 8px;
}

.topic-acc {
  font-family: 'Crimson Pro', serif;
  font-weight: 600;
  color: var(--vermillion);
  font-size: 13px;
}

.mini-bar {
  width: 60px;
  height: 4px;
  background: var(--line-soft);
  border-radius: 2px;
  overflow: hidden;
}

.mini-fill {
  height: 100%;
  background: var(--jade);
  transition: width 0.3s;
}

/* === 分科練習 === */
.topic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 10px;
  margin: 20px 0;
}

.topic-btn {
  padding: 14px 12px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 4px;
  cursor: pointer;
  font-family: 'Noto Serif TC', serif;
  font-size: 13px;
  color: var(--ink);
  transition: all 0.2s;
  text-align: center;
}

.topic-btn:hover {
  border-color: var(--vermillion);
  color: var(--vermillion);
}

.topic-btn small {
  display: block;
  font-size: 11px;
  color: var(--ink-faint);
  margin-top: 4px;
  font-family: 'Crimson Pro', serif;
}

.section-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  margin: 16px 0 8px;
  letter-spacing: 0.1em;
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title::before {
  content: '';
  display: inline-block;
  width: 4px;
  height: 16px;
  background: var(--vermillion);
}

/* === 空狀態 === */
.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--ink-faint);
}

.empty-icon {
  font-size: 48px;
  margin-bottom: 16px;
  font-family: 'Noto Serif TC', serif;
  color: var(--line);
}

.empty-text {
  font-size: 15px;
  font-family: 'Noto Serif TC', serif;
}

/* === 完成畫面 === */
.complete-screen {
  text-align: center;
  padding: 40px 20px;
}

.complete-seal {
  width: 100px;
  height: 100px;
  border: 3px solid var(--vermillion);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 24px;
  font-family: 'Noto Serif TC', serif;
  font-weight: 900;
  color: var(--vermillion);
  font-size: 36px;
  background: rgba(183, 51, 41, 0.05);
  transform: rotate(-5deg);
  letter-spacing: -0.1em;
}

.complete-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 12px;
}

.complete-score {
  font-family: 'Crimson Pro', serif;
  font-size: 48px;
  font-weight: 600;
  color: var(--vermillion);
  margin: 16px 0;
}

.complete-text {
  color: var(--ink-soft);
  margin-bottom: 24px;
  font-size: 15px;
}

/* 響應式 */
@media (max-width: 600px) {
  .app { padding: 20px 14px 60px; }
  h1 { font-size: 22px; }
  .panel { padding: 22px 18px; }
  .stat-num { font-size: 20px; }
  .question-text { font-size: 16px; }
  .option { padding: 12px 14px; font-size: 15px; }
  .tab { padding: 10px 14px; font-size: 14px; }
  .stat-grid { grid-template-columns: 1fr; }
}

/* 滾動條 */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--paper-deep); }
::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--ink-faint); }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="title-row">
      <div class="seal">醫</div>
      <h1>後中醫化學考題練習器</h1>
    </div>
    <div class="subtitle">Post-Bachelor Chinese Medicine · Chemistry Drill</div>
  </header>

  <div class="stats-bar" id="statsBar">
    <div class="stat">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">累計作答</div>
    </div>
    <div class="stat">
      <div class="stat-num jade" id="statAcc">—</div>
      <div class="stat-label">總正確率</div>
    </div>
    <div class="stat">
      <div class="stat-num gold" id="statStreak">0</div>
      <div class="stat-label">連續天數</div>
    </div>
    <div class="stat">
      <div class="stat-num accent" id="statWrong">0</div>
      <div class="stat-label">待複習錯題</div>
    </div>
  </div>

  <nav class="tabs">
    <button class="tab active" data-mode="home">首頁</button>
    <button class="tab" data-mode="daily">每日練習</button>
    <button class="tab" data-mode="topic">分科練習</button>
    <button class="tab" data-mode="exam">歷屆考古題</button>
    <button class="tab" data-mode="wrong">錯題複習</button>
    <button class="tab" data-mode="bookmark">收藏</button>
    <button class="tab" data-mode="stats">統計</button>
  </nav>

  <main class="panel" id="panel"></main>
</div>

<script>
/* ===== 題庫 ===== */
const QUESTIONS = [
  // ====== 普通化學：原子結構與週期表 ======
  {id:'g001', cat:'普通化學', topic:'原子結構', q:'下列何者為鉻 (Cr, Z=24) 的基態電子組態？',
   opts:['[Ar] 3d⁴ 4s²','[Ar] 3d⁵ 4s¹','[Ar] 3d⁶','[Ar] 4s² 4p⁴'], ans:1,
   exp:'鉻為週期表的特例之一。3d⁵ 4s¹ 屬於半填滿構型，能量較 3d⁴ 4s² 低，較為穩定。Cu (Z=29) 也有類似特例，為 [Ar] 3d¹⁰ 4s¹。'},
  {id:'g002', cat:'普通化學', topic:'原子結構', q:'下列哪一組量子數無法存在？',
   opts:['n=3, l=2, mₗ=−2','n=2, l=1, mₗ=0','n=4, l=4, mₗ=0','n=3, l=0, mₗ=0'], ans:2,
   exp:'量子數規則：l 的範圍為 0 到 n−1。當 n=4 時，l 最大只能為 3，故 l=4 不合法。'},
  {id:'g003', cat:'普通化學', topic:'週期性質', q:'下列原子第一游離能由小到大排列正確的是？',
   opts:['Na < Mg < Al','Na < Al < Mg','Al < Na < Mg','Mg < Al < Na'], ans:1,
   exp:'一般週期趨勢右大於左，但 Mg 的 3s² 為全填滿較穩定，故 IE₁(Mg) > IE₁(Al)。Na 失去單電子最容易，IE₁ 最小。'},
  {id:'g004', cat:'普通化學', topic:'週期性質', q:'下列關於電負度 (electronegativity) 的敘述何者錯誤？',
   opts:['F 為電負度最大的元素','同週期由左至右增加','同族由上至下增加','金屬的電負度通常小於非金屬'], ans:2,
   exp:'同族由上至下，原子半徑增加、價電子距核較遠，電負度應為「下降」。'},
  {id:'g005', cat:'普通化學', topic:'週期性質', q:'下列何者原子半徑最大？',
   opts:['Na','K','Mg','Ca'], ans:1,
   exp:'同族由上而下半徑遞增 (Na < K, Mg < Ca)；同週期由左而右半徑遞減 (K > Ca)。故 K 半徑最大。'},

  // ====== 化學鍵結與分子結構 ======
  {id:'g006', cat:'普通化學', topic:'化學鍵結', q:'SF₄ 分子的形狀為何？',
   opts:['正四面體','蹺蹺板形 (see-saw)','平面四方形','三角雙錐'], ans:1,
   exp:'SF₄ 中 S 有 4 個鍵結對與 1 對未共用電子對 (AX₄E)，電子對排列為三角雙錐，分子形狀為蹺蹺板形。'},
  {id:'g007', cat:'普通化學', topic:'化學鍵結', q:'XeF₄ 的分子幾何形狀為？',
   opts:['正四面體','蹺蹺板','平面四方形 (square planar)','八面體'], ans:2,
   exp:'XeF₄ 為 AX₄E₂ 結構，兩對未共用電子對佔據八面體上下軸位置，4 個 F 形成平面四方形。'},
  {id:'g008', cat:'普通化學', topic:'化學鍵結', q:'下列分子中，何者中心原子採用 sp³d² 混成？',
   opts:['BF₃','CH₄','PCl₅','SF₆'], ans:3,
   exp:'sp³d² 混成形成 6 個混成軌域，呈八面體排列，SF₆ 即為此例。BF₃ 為 sp²，CH₄ 為 sp³，PCl₅ 為 sp³d。'},
  {id:'g009', cat:'普通化學', topic:'化學鍵結', q:'下列分子中，何者具有偶極矩 (dipole moment)？',
   opts:['CO₂','BF₃','CH₄','NH₃'], ans:3,

/* ===== 工具函數 ===== */
const STORAGE_KEY = 'chemPracticeProgress_v1';

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch (e) {}
  return {
    totalAnswered: 0,
    totalCorrect: 0,
    byTopic: {},
    byCat: {},
    wrongIds: [],
    bookmarkIds: [],
    history: [],
    streak: 0,
    lastDate: null,
    todayDate: null,
    todayAnswered: 0,
    perQuestion: {} // {id: {seen, correct, lastWrong}}
  };
}

function saveState(s) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(s));
}

let state = loadState();
let currentMode = 'home';
let currentQuestionList = [];
let currentIndex = 0;
let answered = false;

function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function updateStreak() {
  const today = todayStr();
  if (state.todayDate !== today) {
    // 新的一天
    if (state.lastDate) {
      const last = new Date(state.lastDate);
      const now = new Date(today);
      const diffDays = Math.round((now - last) / (1000*60*60*24));
      if (diffDays === 1) {
        state.streak = (state.streak || 0) + 1;
      } else if (diffDays > 1) {
        state.streak = 1;
      }
    } else {
      state.streak = 1;
    }
    state.todayDate = today;
    state.todayAnswered = 0;
    state.lastDate = today;
  }
  saveState(state);
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function refreshStats() {
  document.getElementById('statTotal').textContent = state.totalAnswered;
  const acc = state.totalAnswered > 0
    ? Math.round(state.totalCorrect / state.totalAnswered * 100) + '%'
    : '—';
  document.getElementById('statAcc').textContent = acc;
  document.getElementById('statStreak').textContent = state.streak || 0;
  document.getElementById('statWrong').textContent = state.wrongIds.length;
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 6) return '夜深了，仍在用功';
  if (h < 12) return '早安，今日宜攻讀化學';
  if (h < 18) return '午後時光，靜心練題';
  return '夜讀為功，業精於勤';
}

/* ===== 渲染：每日練習 ===== */
function renderDaily() {
  if (currentQuestionList.length === 0) {
    currentQuestionList = shuffle(QUESTIONS).slice(0, 10);
    currentIndex = 0;
  }
  renderQuestion();
}

/* ===== 渲染：分科 ===== */
function renderTopic() {
  const cats = {};
  QUESTIONS.forEach(q => {
    if (!cats[q.cat]) cats[q.cat] = {};
    if (!cats[q.cat][q.topic]) cats[q.cat][q.topic] = 0;
    cats[q.cat][q.topic]++;
  });

  let html = '';
  for (const cat in cats) {
    html += `<div class="section-title">${cat}</div><div class="topic-grid">`;
    for (const topic in cats[cat]) {
      const count = cats[cat][topic];
      const stat = state.byTopic[topic];
      const acc = stat && stat.answered > 0
        ? Math.round(stat.correct / stat.answered * 100) + '%'
        : '—';
      html += `
        <button class="topic-btn" onclick="startTopic('${escapeHtml(cat)}','${escapeHtml(topic)}')">
          <div>${topic}</div>
          <small>${count} 題 · 正確率 ${acc}</small>
        </button>
      `;
    }
    html += `</div>`;
  }

  document.getElementById('panel').innerHTML = html || '<div class="empty">無題目</div>';
}

function startTopic(cat, topic) {
  currentQuestionList = shuffle(QUESTIONS.filter(q => q.cat === cat && q.topic === topic));
  currentIndex = 0;
  renderQuestion();
}

/* ===== 渲染：歷屆考古題 ===== */
function renderExam() {
  // 取得所有有 year/source 標籤的題目，依「source + year」分組
  const exams = {};
  QUESTIONS.forEach(q => {
    if (q.year && q.source) {
      const key = q.source + ' ' + q.year + ' 學年度';
      if (!exams[key]) exams[key] = [];
      exams[key].push(q);
    }
  });

  if (Object.keys(exams).length === 0) {
    document.getElementById('panel').innerHTML = `
      <div class="empty">
        <div class="empty-icon">無</div>
        <div class="empty-text">目前尚未收錄歷屆考古題</div>
      </div>
    `;
    return;
  }

  let html = `<div class="section-title">歷屆考題模擬</div>`;
  html += `<div style="background:var(--paper); padding:14px 18px; border-left:3px solid var(--vermillion); border-radius:0 4px 4px 0; color:var(--ink-soft); font-size:13.5px; line-height:1.7; margin-bottom:18px;">
    完整收錄歷屆學士後中醫化學試題。可選擇「依序模擬」(按原試卷題號依序作答，模擬正式考試體驗) 或「隨機練習」(打散題序避免記憶順序)。
  </div>`;

  for (const examName in exams) {
    const list = exams[examName];
    // 排序：依 id 中末尾數字升冪 (cm115_01, cm115_02 ...)
    list.sort((a, b) => {
      const na = parseInt((a.id.match(/(\d+)$/) || [0, 0])[1], 10);
      const nb = parseInt((b.id.match(/(\d+)$/) || [0, 0])[1], 10);
      return na - nb;
    });

    // 答題狀況統計
    let answered = 0, correct = 0;
    list.forEach(q => {
      const r = state.perQuestion && state.perQuestion[q.id];
      if (r && r.answered) {
        answered++;
        if (r.lastCorrect) correct++;
      }
    });
    const accStr = answered > 0
      ? `已作答 ${answered}/${list.length}，正確 ${correct} 題 (${Math.round(correct/answered*100)}%)`
      : `共 ${list.length} 題 · 尚未作答`;

    html += `
      <div style="background:var(--paper-soft); border:1px solid var(--line); border-radius:6px; padding:18px 20px; margin-bottom:14px;">
        <div style="font-family:'Noto Serif TC',serif; font-size:17px; font-weight:600; color:var(--ink); margin-bottom:6px;">
          ${examName}
        </div>
        <div style="color:var(--ink-faint); font-size:13px; margin-bottom:14px;">${accStr}</div>
        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <button class="topic-btn" style="flex:1; min-width:140px;" onclick="startExam('${escapeHtml(examName)}', false)">
            <div>依序模擬考</div>
            <small>1 → ${list.length} 題依原序作答</small>
          </button>
          <button class="topic-btn" style="flex:1; min-width:140px;" onclick="startExam('${escapeHtml(examName)}', true)">
            <div>隨機練習</div>
            <small>打散順序作答</small>
          </button>
        </div>
      </div>
    `;
  }

  document.getElementById('panel').innerHTML = html;
}

function startExam(examName, randomize) {
  // examName 形如 "中國醫 115 學年度"
  const m = examName.match(/^(.+?)\s+(\d+)\s/);
  if (!m) return;
  const source = m[1], year = parseInt(m[2], 10);
  let list = QUESTIONS.filter(q => q.source === source && q.year === year);
  list.sort((a, b) => {
    const na = parseInt((a.id.match(/(\d+)$/) || [0, 0])[1], 10);
    const nb = parseInt((b.id.match(/(\d+)$/) || [0, 0])[1], 10);
    return na - nb;
  });
  if (randomize) list = shuffle(list);
  currentQuestionList = list;
  currentIndex = 0;
  renderQuestion();
}

/* ===== 渲染：錯題 ===== */
function renderWrong() {
  const wrongQs = QUESTIONS.filter(q => state.wrongIds.includes(q.id));
  if (wrongQs.length === 0) {
    document.getElementById('panel').innerHTML = `
      <div class="empty">
        <div class="empty-icon">○</div>
        <div class="empty-text">目前沒有錯題</div>
        <div style="margin-top:8px; font-size:13px;">繼續努力，保持這個狀態！</div>
      </div>
    `;
    return;
  }
  currentQuestionList = shuffle(wrongQs);
  currentIndex = 0;
  renderQuestion();
}

/* ===== 渲染：收藏 ===== */
function renderBookmark() {
  const bm = QUESTIONS.filter(q => state.bookmarkIds.includes(q.id));
  if (bm.length === 0) {
    document.getElementById('panel').innerHTML = `
      <div class="empty">
        <div class="empty-icon">藏</div>
        <div class="empty-text">尚未收藏任何題目</div>
        <div style="margin-top:8px; font-size:13px;">作答時按右上角的「☆」可收藏題目</div>
      </div>
    `;
    return;
  }
  currentQuestionList = bm;
  currentIndex = 0;
  renderQuestion();
}

/* ===== 渲染：題目 ===== */
function renderQuestion() {
  if (currentIndex >= currentQuestionList.length) {
    renderComplete();
    return;
  }

  const q = currentQuestionList[currentIndex];
  answered = false;
  const isBookmarked = state.bookmarkIds.includes(q.id);
  const progress = ((currentIndex) / currentQuestionList.length) * 100;

  const optsHtml = q.opts.map((opt, i) => `
    <button class="option" data-idx="${i}" onclick="answerQuestion(${i})">
      <span class="option-letter">${String.fromCharCode(65+i)}</span>
      <span class="option-text">${escapeHtml(opt)}</span>
    </button>
  `).join('');

  document.getElementById('panel').innerHTML = `
    <div class="progress-bar"><div class="progress-fill" style="width:${progress}%"></div></div>
    <div class="question-meta">
      <div class="qmeta-left">
        <span class="tag tag-cat">${q.cat}</span>
        <span class="tag tag-topic">${q.topic}</span>
      </div>
      <div style="display:flex; align-items:center; gap:8px;">
        <span class="qmeta-right">第 ${currentIndex+1} / ${currentQuestionList.length} 題</span>
        <button class="bookmark-btn ${isBookmarked ? 'active' : ''}" onclick="toggleBookmark('${q.id}')" title="收藏題目">
          ${isBookmarked ? '★' : '☆'}
        </button>
      </div>
    </div>
    <div class="question-text">${escapeHtml(q.q)}</div>
    <div class="options" id="opts">${optsHtml}</div>
    <div id="explanation"></div>
    <div class="actions" id="actions">
      <button class="btn btn-secondary" onclick="exitPractice()">結束練習</button>
    </div>
  `;
}

function answerQuestion(picked) {
  if (answered) return;
  answered = true;
  const q = currentQuestionList[currentIndex];
  const correct = picked === q.ans;

  // 更新所有選項狀態
  const optBtns = document.querySelectorAll('.option');
  optBtns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === picked) btn.classList.add('wrong');
  });

  // 更新統計
  state.totalAnswered++;
  if (correct) state.totalCorrect++;

  if (!state.byTopic[q.topic]) state.byTopic[q.topic] = {answered:0, correct:0};
  state.byTopic[q.topic].answered++;
  if (correct) state.byTopic[q.topic].correct++;

  if (!state.byCat[q.cat]) state.byCat[q.cat] = {answered:0, correct:0};
  state.byCat[q.cat].answered++;
  if (correct) state.byCat[q.cat].correct++;

  if (!state.perQuestion[q.id]) state.perQuestion[q.id] = {seen:0, correct:0, consecutive:0};
  state.perQuestion[q.id].seen++;
  if (correct) {
    state.perQuestion[q.id].correct++;
    state.perQuestion[q.id].consecutive = (state.perQuestion[q.id].consecutive || 0) + 1;
    // 連續答對 2 次以上自動移出錯題
    if (state.perQuestion[q.id].consecutive >= 2) {
      state.wrongIds = state.wrongIds.filter(id => id !== q.id);
    }
  } else {
    state.perQuestion[q.id].consecutive = 0;
    if (!state.wrongIds.includes(q.id)) state.wrongIds.push(q.id);
  }

  // 更新今日計數
  updateStreak();
  state.todayAnswered = (state.todayAnswered || 0) + 1;

  saveState(state);
  refreshStats();

  // 顯示解析
  document.getElementById('explanation').innerHTML = `
    <div class="explanation">
      <div class="exp-title">${correct ? '◆ 正解' : '◆ 解析'}</div>
      <div class="exp-content">${escapeHtml(q.exp)}</div>
    </div>
  `;

  // 更新動作列
  document.getElementById('actions').innerHTML = `
    <button class="btn btn-secondary" onclick="exitPractice()">結束練習</button>
    <button class="btn btn-primary" onclick="nextQuestion()">下一題 →</button>
  `;
}

function nextQuestion() {
  currentIndex++;
  renderQuestion();
}

function exitPractice() {
  currentQuestionList = [];
  currentIndex = 0;
  switchMode('home');
}

function toggleBookmark(id) {
  if (state.bookmarkIds.includes(id)) {
    state.bookmarkIds = state.bookmarkIds.filter(x => x !== id);
  } else {
    state.bookmarkIds.push(id);
  }
  saveState(state);
  // 重新渲染當前題目以更新書籤狀態
  const btn = document.querySelector('.bookmark-btn');
  if (btn) {
    const isB = state.bookmarkIds.includes(id);
    btn.classList.toggle('active', isB);
    btn.textContent = isB ? '★' : '☆';
  }
}

/* ===== 完成畫面 ===== */
function renderComplete() {
  const total = currentQuestionList.length;
  // 從本輪歷史計算正確數較複雜；用簡單方式：再用 state 推算或記錄本輪
  // 為簡化，重算當前輪：透過 perQuestion 最近一次紀錄不可靠，改記錄本輪
  // 此處顯示鼓勵訊息
  const msg = total >= 8 ? '功夫不負有心人' : total >= 5 ? '勤學好思，繼續加油' : '今日小試牛刀';
  document.getElementById('panel').innerHTML = `
    <div class="complete-screen">
      <div class="complete-seal">完</div>
      <div class="complete-title">本輪練習結束</div>
      <div class="complete-text">已完成 ${total} 題</div>
      <div style="color:var(--ink-soft); margin: 18px 0; font-family:'Noto Serif TC',serif; font-size:16px;">
        「${msg}」
      </div>
      <div style="margin-top: 30px;">
        <button class="btn btn-secondary" onclick="exitPractice()">返回首頁</button>
        <button class="btn btn-primary" onclick="restartCurrent()" style="margin-left:8px;">再練一輪</button>
      </div>
    </div>
  `;
  currentQuestionList = [];
  currentIndex = 0;
}

function restartCurrent() {
  currentQuestionList = shuffle(QUESTIONS).slice(0, 10);
  currentIndex = 0;
  renderQuestion();
}

/* ===== 統計頁 ===== */
function renderStats() {
  let topicHtml = '';
  const topics = Object.keys(state.byTopic).sort();
  if (topics.length === 0) {
    topicHtml = '<div style="color:var(--ink-faint); padding:8px 0;">尚無紀錄</div>';
  } else {
    topics.forEach(t => {
      const s = state.byTopic[t];
      const acc = Math.round(s.correct / s.answered * 100);
      topicHtml += `
        <div class="topic-row">
          <span class="topic-name">${t}</span>
          <span class="topic-stats">
            <span style="color:var(--ink-faint); font-size:12px;">${s.correct}/${s.answered}</span>
            <span class="mini-bar"><span class="mini-fill" style="width:${acc}%"></span></span>
            <span class="topic-acc">${acc}%</span>
          </span>
        </div>
      `;
    });
  }

  let catHtml = '';
  const cats = Object.keys(state.byCat);
  if (cats.length === 0) {
    catHtml = '<div style="color:var(--ink-faint); padding:8px 0;">尚無紀錄</div>';
  } else {
    cats.forEach(c => {
      const s = state.byCat[c];
      const acc = Math.round(s.correct / s.answered * 100);
      catHtml += `
        <div class="topic-row">
          <span class="topic-name" style="font-weight:700;">${c}</span>
          <span class="topic-stats">
            <span style="color:var(--ink-faint); font-size:12px;">${s.correct}/${s.answered}</span>
            <span class="topic-acc">${acc}%</span>
          </span>
        </div>
      `;
    });
  }

  document.getElementById('panel').innerHTML = `
    <div class="stat-grid">
      <div class="stat-card">
        <div class="stat-card-title">分科正確率</div>
        ${catHtml}
      </div>
      <div class="stat-card">
        <div class="stat-card-title">學習進度</div>
        <div class="topic-row">
          <span class="topic-name">累計作答</span>
          <span class="topic-acc">${state.totalAnswered} 題</span>
        </div>
        <div class="topic-row">
          <span class="topic-name">總正確率</span>
          <span class="topic-acc">${state.totalAnswered>0 ? Math.round(state.totalCorrect/state.totalAnswered*100) : 0}%</span>
        </div>
        <div class="topic-row">
          <span class="topic-name">連續學習</span>
          <span class="topic-acc">${state.streak || 0} 天</span>
        </div>
        <div class="topic-row">
          <span class="topic-name">待複習錯題</span>
          <span class="topic-acc">${state.wrongIds.length} 題</span>
        </div>
        <div class="topic-row">
          <span class="topic-name">已收藏題目</span>
          <span class="topic-acc">${state.bookmarkIds.length} 題</span>
        </div>
      </div>
    </div>
    <div class="stat-card" style="margin-top:14px;">
      <div class="stat-card-title">細項主題</div>
      ${topicHtml}
    </div>
    <div style="text-align:center; margin-top: 24px;">
      <button class="btn btn-secondary" onclick="confirmReset()">清除所有紀錄</button>
    </div>
  `;
}

function confirmReset() {
  if (confirm('確定要清除所有練習紀錄嗎？此操作無法復原。')) {
    localStorage.removeItem(STORAGE_KEY);
    state = loadState();
    refreshStats();
    renderStats();
  }
}

/* ===== 模式切換 ===== */
function switchMode(mode) {
  currentMode = mode;
  currentQuestionList = [];
  currentIndex = 0;

  // 更新 tab 樣式
  document.querySelectorAll('.tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });

  if (mode === 'home') renderHome();
  else if (mode === 'daily') renderDaily();
  else if (mode === 'topic') renderTopic();
  else if (mode === 'exam') renderExam();
  else if (mode === 'wrong') renderWrong();
  else if (mode === 'bookmark') renderBookmark();
  else if (mode === 'stats') renderStats();
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

/* ===== 初始化 ===== */
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => switchMode(t.dataset.mode));
});

updateStreak();
refreshStats();
renderHome();
</script>
